<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>Playboard Live — 관객 점수판</title>
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
</head>
<body>
  <!-- 음악 autoplay 허용 버튼 (브라우저 정책상 첫 상호작용 필요) -->
  <button id="audioUnlockBtn" onclick="unlockAudio()" style="
    position:fixed; bottom:16px; right:16px; z-index:100;
    background:rgba(0,0,0,0.55); color:#fff; border:none; border-radius:50px;
    padding:8px 16px; font-size:0.85rem; cursor:pointer; backdrop-filter:blur(4px);">
    🔊 음악 활성화
  </button>

  <!-- 결과 요약 버튼 -->
  <button id="summaryBtn" onclick="showDisplaySummary()" style="
    position:fixed; bottom:16px; left:16px; z-index:100;
    background:rgba(0,0,0,0.55); color:#fff; border:none; border-radius:50px;
    padding:8px 16px; font-size:0.85rem; cursor:pointer; backdrop-filter:blur(4px);
    display:none;">
    📋 결과 요약
  </button>

  <!-- 결과 요약 모달 -->
  <div id="displaySummaryModal" style="
    display:none; position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,0.72); align-items:center; justify-content:center;">
    <div style="
      background:#fff; border-radius:16px; padding:24px; width:90%; max-width:400px;
      max-height:85vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,0.4);">
      <div style="font-size:1.1rem; font-weight:800; margin-bottom:16px; text-align:center; color:#1e1b4b;">세션 결과 요약</div>
      <div id="displaySummaryContent"></div>
      <div style="margin-top:18px; text-align:center;">
        <button onclick="closeDisplaySummary()" style="
          padding:10px 28px; background:#6366f1; color:#fff; border:none;
          border-radius:8px; font-size:0.95rem; font-weight:700; cursor:pointer;">닫기</button>
      </div>
    </div>
  </div>

  <div class="display-fullscreen" id="display">
    <!-- No session state -->
    <div id="noSession" class="text-center" style="padding:40vh 16px; display:none;">
      <div style="font-size:3rem; margin-bottom:16px;">📺</div>
      <div style="font-size:1.5rem; opacity:0.5;">활성 세션이 없습니다</div>
      <div class="text-sm text-muted mt-2">운영 화면에서 세션을 선택해 주세요</div>
    </div>

    <!-- Display content -->
    <div id="displayContent" style="display:none; flex:1; display:flex; flex-direction:column;">
      <!-- Session Header -->
      <div class="display-header">
        <div class="session-title" id="displaySessionTitle"></div>
      </div>

      <!-- Scoreboard -->
      <div class="display-scoreboard">
        <div class="team left">
          <div class="team-name" id="leftTeamName"></div>
          <div class="score" id="leftScore">0</div>
        </div>
        <div class="vs">VS</div>
        <div class="team right">
          <div class="team-name" id="rightTeamName"></div>
          <div class="score" id="rightScore">0</div>
        </div>
      </div>

      <!-- Timer -->
      <div id="displayTimer" class="display-timer" style="display:none;">
        <div class="display-timer-count" id="displayTimerCount">0:00</div>
      </div>

      <!-- Current Game -->
      <div class="display-current-game" id="currentGame"></div>

      <!-- Recent Record -->
      <div class="display-recent-record" id="recentRecord"></div>

      <!-- Progress -->
      <div class="display-progress">
        <div class="display-progress-bar">
          <div class="fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="display-progress-text" id="progressText"></div>
      </div>
    </div>
  </div>

  <script src="assets/app.js"></script>
  <script>
    // === Display Page Logic (Read-Only) ===
    function render() {
      const s = App.Session.getActive();
      const noSession = document.getElementById('noSession');
      const content = document.getElementById('displayContent');

      if (!s) {
        noSession.style.display = 'block';
        content.style.display = 'none';
        document.getElementById('summaryBtn').style.display = 'none';
        return;
      }

      noSession.style.display = 'none';
      content.style.display = 'flex';
      document.getElementById('summaryBtn').style.display = 'block';

      // Session title
      document.getElementById('displaySessionTitle').textContent = s.title;

      // Team names
      document.getElementById('leftTeamName').textContent = s.leftTeamName;
      document.getElementById('rightTeamName').textContent = s.rightTeamName;

      // Scores
      const scores = App.Session.getScores(s.id);
      document.getElementById('leftScore').textContent = scores.leftTotal;
      document.getElementById('rightScore').textContent = scores.rightTotal;

      // Current game & progress
      if (s.repertoireId) {
        const items = App.Repertoire.items(s.repertoireId).filter(i => i.active);
        const records = App.Record.bySession(s.id);
        const completedItems = new Set(App.Session.getCompletedItemIds(s.id));

        // Find current game
        let currentGameName = '';
        for (const item of items) {
          if (!completedItems.has(item.id)) {
            const game = App.Game.byId(item.gameId);
            currentGameName = game ? game.name : '';
            break;
          }
        }

        // Progress
        const completedCount = items.filter(item => completedItems.has(item.id)).length;
        const total = items.length;
        const pct = total > 0 ? Math.round((completedCount / total) * 100) : 0;

        document.getElementById('currentGame').textContent = currentGameName ? `현재: ${currentGameName}` : '모든 게임 완료!';
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressText').textContent = `${completedCount} / ${total} 완료`;

        // Recent record
        if (records.length > 0) {
          const latest = records[records.length - 1];
          const item = latest.repertoireItemId ? App.RepertoireItem.byId(latest.repertoireItemId) : null;
          const game = item ? App.Game.byId(item.gameId) : null;
          const label = latest.resultType === 'quiz_round'
                        ? `퀴즈 · ${s.leftTeamName} ${latest.correctCountLeft || 0} / ${s.rightTeamName} ${latest.correctCountRight || 0}`
                        : latest.resultType === 'person_round'
                        ? `대표선수 · ${s.leftTeamName} ${latest.correctCountLeft || 0}명 / ${s.rightTeamName} ${latest.correctCountRight || 0}명`
                        : latest.resultType === 'left_win' ? `${s.leftTeamName} 승` :
                        latest.resultType === 'right_win' ? `${s.rightTeamName} 승` :
                        latest.resultType === 'draw_zero' ? '동점 (0점)' :
                        latest.resultType === 'draw_half' ? '동점 (절반)' :
                        latest.resultType === 'bonus_left' ? `${s.leftTeamName} 보너스 +${latest.leftPoints}` :
                        `${s.rightTeamName} 보너스 +${latest.rightPoints}`;
          document.getElementById('recentRecord').textContent =
            `최근: ${game ? game.name : ''} — ${label} (${latest.leftPoints}:${latest.rightPoints})`;
        } else {
          document.getElementById('recentRecord').textContent = '아직 기록이 없습니다.';
        }
      } else {
        document.getElementById('currentGame').textContent = '';
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('progressText').textContent = '';
        document.getElementById('recentRecord').textContent = '';
      }
    }

    // === Timer ===
    let _timerWasUrgent = false;
    let _dispLastBeepSec = -1;
    let _dispBeepEndPlayed = false;
    let _dispBeepAudio = null;
    let _dispBeepEndAudio = null;

    function _dispMakeBeepWav(freq, durationSec) {
      const sr = 44100, n = Math.ceil(sr * durationSec);
      const buf = new ArrayBuffer(44 + n * 2);
      const v = new DataView(buf);
      const ws = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
      ws(0,'RIFF'); v.setUint32(4, 36+n*2, true);
      ws(8,'WAVE'); ws(12,'fmt '); v.setUint32(16, 16, true);
      v.setUint16(20, 1, true); v.setUint16(22, 1, true);
      v.setUint32(24, sr, true); v.setUint32(28, sr*2, true);
      v.setUint16(32, 2, true); v.setUint16(34, 16, true);
      ws(36,'data'); v.setUint32(40, n*2, true);
      for (let i = 0; i < n; i++) {
        const t = i / sr;
        const fade = Math.max(0, 1 - (t / durationSec) * 1.5);
        v.setInt16(44 + i * 2, Math.sin(2 * Math.PI * freq * t) * fade * 0.65 * 32767, true);
      }
      return URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
    }

    function _dispInitBeepAudio() {
      if (_dispBeepAudio) return;
      try {
        _dispBeepAudio = new Audio(_dispMakeBeepWav(660, 0.2));
        _dispBeepEndAudio = new Audio(_dispMakeBeepWav(920, 0.85));
        _dispBeepAudio.volume = 0.001;
        _dispBeepAudio.play().then(() => { _dispBeepAudio.pause(); _dispBeepAudio.currentTime = 0; _dispBeepAudio.volume = 0.85; }).catch(() => {});
        _dispBeepEndAudio.volume = 0.001;
        _dispBeepEndAudio.play().then(() => { _dispBeepEndAudio.pause(); _dispBeepEndAudio.currentTime = 0; _dispBeepEndAudio.volume = 0.85; }).catch(() => {});
      } catch(e) {}
    }

    function _dispPlayBeep(isEnd) {
      if (!_dispBeepAudio) return;
      const audio = isEnd ? _dispBeepEndAudio : _dispBeepAudio;
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }

    function renderTimer() {
      const remaining = App.Timer.getRemainingMs();
      const state = App.Timer.getState();
      const el = document.getElementById('displayTimer');
      const countEl = document.getElementById('displayTimerCount');

      if (state.status !== 'running' || remaining <= 0) {
        if (state.status === 'running') {
          App.Timer.stop();
          if (!_dispBeepEndPlayed) { _dispPlayBeep(true); _dispBeepEndPlayed = true; }
        }
        el.style.display = 'none';
        _timerWasUrgent = false;
        _dispLastBeepSec = -1;
        return;
      }

      el.style.display = 'block';
      const secs = Math.ceil(remaining / 1000);
      const m = Math.floor(secs / 60), s = secs % 60;
      countEl.textContent = `${m}:${String(s).padStart(2, '0')}`;

      const isUrgent = secs <= 10;
      el.classList.toggle('display-timer--urgent', isUrgent);

      // 10~1초 카운트다운 비프
      if (secs <= 10 && secs > 0 && secs !== _dispLastBeepSec) {
        _dispPlayBeep(false);
        _dispLastBeepSec = secs;
      }

      // 10초 진입 시 한 번만 flash
      if (isUrgent && !_timerWasUrgent) {
        el.classList.add('display-timer--flash');
        setTimeout(() => el.classList.remove('display-timer--flash'), 500);
        _dispBeepEndPlayed = false; // 새 카운트다운 시작
      }
      _timerWasUrgent = isUrgent;
    }

    // === Wake Lock (화면 꺼짐 방지) ===
    let _wakeLock = null;
    async function _requestWakeLock() {
      if (!('wakeLock' in navigator)) return;
      try {
        _wakeLock = await navigator.wakeLock.request('screen');
      } catch (e) {}
    }
    _requestWakeLock();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') _requestWakeLock();
    });

    // === Audio unlock (브라우저 autoplay 정책 해제) ===
    let _audioUnlocked = false;

    function unlockAudio() {
      // iOS Safari: audio.play()는 user gesture 동기 콜텍스트 안에서만 허용됨
      _audioUnlocked = true;
      document.getElementById('audioUnlockBtn').style.display = 'none';
      _dispInitBeepAudio(); // 비프 오디오 잠금 해제
      applyMusicState(); // 동기 호출 — iOS 정책 충족
      new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=').play().catch(() => {});
    }

    // === Music (display side) ===
    let _dispMusicAudio = null;
    let _dispLastCmdId = null;
    let _dispIsAnnouncement = false;
    let _dispRepeatMode = 'none';
    let _dispAnnouncementVol = 0.15;
    const DISP_NORMAL_VOL = 1.0;
    const DISP_ANNOUNCEMENT_VOL = 0.15;
    const DISP_FADE_MS = 600;

    function _dispFade(audio, targetVol, ms, cb) {
      const startVol = audio.volume;
      const diff = targetVol - startVol;
      if (Math.abs(diff) < 0.001) { audio.volume = targetVol; if (cb) cb(); return; }
      const startTime = performance.now();
      function step(now) {
        const t = Math.min((now - startTime) / ms, 1);
        audio.volume = Math.max(0, Math.min(1, startVol + diff * t));
        if (t < 1) requestAnimationFrame(step);
        else if (cb) cb();
      }
      requestAnimationFrame(step);
    }

    function _dispStartTrack(filename, url) {
      if (_dispMusicAudio) { _dispMusicAudio.pause(); _dispMusicAudio = null; }
      const vol = _dispIsAnnouncement ? _dispAnnouncementVol : DISP_NORMAL_VOL;
      const src = url || `audio/${filename}`;
      const audio = new Audio(src);
      audio.volume = vol;
      audio.play().catch(() => {});
      _dispMusicAudio = audio;
      audio.addEventListener('ended', function() {
        if (_dispMusicAudio !== audio) return;
        if (_dispRepeatMode === 'one') {
          audio.currentTime = 0; audio.play().catch(() => {});
        } else if (_dispRepeatMode === 'all') {
          const raw = localStorage.getItem('rec_music_tracks') || '[]';
          const parsed = JSON.parse(raw);
          const arr = Array.isArray(parsed) ? parsed : Object.values(parsed);
          const idx = arr.findIndex(t => t.filename === filename);
          if (arr.length > 0) {
            const next = arr[(idx + 1) % arr.length];
            _dispStartTrack(next.filename, next.url || null);
          }
        }
      });
    }

    function applyMusicState() {
      const st = JSON.parse(localStorage.getItem('rec_music_state') || '{}');
      if (!_audioUnlocked) return; // 미해제시 모든 명령 보류 — unlockAudio 후 재호출됨
      if (!st.commandId || st.commandId === _dispLastCmdId) return;
      _dispLastCmdId = st.commandId;

      if (st.command === 'stop') {
        if (_dispMusicAudio) {
          _dispFade(_dispMusicAudio, 0, DISP_FADE_MS, () => {
            if (_dispMusicAudio) { _dispMusicAudio.pause(); _dispMusicAudio = null; }
          });
        }
        return;
      }

      if (st.command === 'repeat') {
        _dispRepeatMode = st.repeatMode || 'none';
        return;
      }

      // 'play' 또는 'announcement': 볼륨 상태 업데이트
      if (st.announcementVol != null) _dispAnnouncementVol = st.announcementVol;
      const targetVol = !!st.isAnnouncement ? _dispAnnouncementVol : DISP_NORMAL_VOL;
      _dispIsAnnouncement = !!st.isAnnouncement;

      if (st.command === 'announcement' && _dispMusicAudio) {
        // 이미 재생 중: 볼륨만 조절
        _dispFade(_dispMusicAudio, targetVol, DISP_FADE_MS);
        return;
      }

      // 'play' 명령이거나, 'announcement'인데 재생 중인 오디오가 없는 경우 → 트랙 시작
      if (st.filename) {
        _dispRepeatMode = st.repeatMode || 'none';
        _dispStartTrack(st.filename, st.url || null);
      }
    }

    // === 결과 요약 ===
    function showDisplaySummary() {
      const s = App.Session.getActive();
      if (!s) return;
      const scores = App.Session.getScores(s.id);
      const records = App.Record.bySession(s.id);
      const groups = [];
      const keyIndex = {};
      records.forEach(r => {
        const key = r.repertoireItemId || '__none__';
        if (keyIndex[key] === undefined) { keyIndex[key] = groups.length; groups.push({ key, records: [] }); }
        groups[keyIndex[key]].records.push(r);
      });
      const winner = scores.leftTotal > scores.rightTotal ? `🏆 ${s.leftTeamName} 우승`
        : scores.rightTotal > scores.leftTotal ? `🏆 ${s.rightTeamName} 우승`
        : '🤝 무승부';
      const gameRows = groups.map((group, i) => {
        const item = group.key !== '__none__' ? App.RepertoireItem.byId(group.key) : null;
        const game = item ? App.Game.byId(item.gameId) : null;
        const leftSub = group.records.reduce((sum, r) => sum + (r.leftPoints || 0), 0);
        const rightSub = group.records.reduce((sum, r) => sum + (r.rightPoints || 0), 0);
        return `<div style="padding:8px 0; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
          <span style="font-size:0.9rem; color:#374151;">${i + 1}. ${game ? game.name : '기타'}</span>
          <span style="font-size:0.9rem; font-weight:700; color:#555;">${leftSub} : ${rightSub}</span>
        </div>`;
      }).join('');
      document.getElementById('displaySummaryContent').innerHTML = `
        <div style="text-align:center; margin-bottom:16px;">
          <div style="font-size:1rem; font-weight:700; color:#6366f1;">${s.title}</div>
        </div>
        <div style="display:flex; justify-content:center; align-items:center; gap:24px; padding:16px; background:#f8f9ff; border-radius:12px; margin-bottom:14px;">
          <div style="text-align:center;">
            <div style="font-size:0.85rem; color:#555; margin-bottom:4px;">${s.leftTeamName}</div>
            <div style="font-size:2.5rem; font-weight:900; color:#2563eb; line-height:1;">${scores.leftTotal}</div>
          </div>
          <div style="font-size:1.5rem; color:#bbb;">:</div>
          <div style="text-align:center;">
            <div style="font-size:0.85rem; color:#555; margin-bottom:4px;">${s.rightTeamName}</div>
            <div style="font-size:2.5rem; font-weight:900; color:#dc2626; line-height:1;">${scores.rightTotal}</div>
          </div>
        </div>
        <div style="text-align:center; font-size:1rem; font-weight:700; color:#6366f1; margin-bottom:14px;">${winner}</div>
        ${gameRows ? `<div style="font-size:0.8rem; color:#888; font-weight:700; margin-bottom:4px;">게임별</div>${gameRows}` : ''}
      `;
      const modal = document.getElementById('displaySummaryModal');
      modal.style.display = 'flex';
    }

    function closeDisplaySummary() {
      document.getElementById('displaySummaryModal').style.display = 'none';
    }

    // 모달 바깥 클릭 시 닫기
    document.getElementById('displaySummaryModal').addEventListener('click', function(e) {
      if (e.target === this) closeDisplaySummary();
    });

    // Auto-refresh: score 2초, timer 500ms
    window._onFirebaseSync = function() { render(); applyMusicState(); };
    render();
    renderTimer();
    applyMusicState();
    setInterval(render, 2000);
    setInterval(renderTimer, 500);
  </script>
  <script>
    App.Firebase.init({
      apiKey: "AIzaSyCcqOqEDuUEfGESDhj5tsw0fwfHFnWcQx8",
      authDomain: "playboard-live.firebaseapp.com",
      databaseURL: "https://playboard-live-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "playboard-live",
      storageBucket: "playboard-live.firebasestorage.app",
      messagingSenderId: "1056586454779",
      appId: "1:1056586454779:web:42d432d6593d518b82c25e"
    });
    function _showNoLink() {
      const _ns = document.getElementById('noSession');
      _ns.innerHTML = '<div style="font-size:3rem;margin-bottom:16px;">🔗</div><div style="font-size:1.5rem;opacity:0.5;">연결된 운영 화면이 없습니다</div><div class="text-sm text-muted mt-2">운영 화면에서 관객 화면 버튼을 눌러 주세요.</div>';
      _ns.style.display = 'block';
      document.getElementById('displayContent').style.display = 'none';
    }

    const _params = new URLSearchParams(location.search);
    const _codeParam = _params.get('code');
    const _uidParam = _params.get('uid') || localStorage.getItem('_pbauth_uid');

    if (_codeParam) {
      App.Firebase.resolveCode(_codeParam, uid => {
        if (uid) {
          App.Firebase.watchUid(uid);
        } else {
          const _ns = document.getElementById('noSession');
          _ns.innerHTML = `<div style="font-size:3rem;margin-bottom:16px;">❓</div><div style="font-size:1.5rem;opacity:0.5;">"${_codeParam}" 코드를 찾을 수 없습니다</div><div class="text-sm text-muted mt-2">운영 화면에서 코드를 확인해 주세요.</div>`;
          _ns.style.display = 'block';
          document.getElementById('displayContent').style.display = 'none';
        }
      });
    } else if (_uidParam) {
      App.Firebase.watchUid(_uidParam);
    } else {
      _showNoLink();
    }
  </script>
</body>
