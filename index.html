<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playboard Live</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="container" style="max-width:720px;">
    <div class="app-header" style="border-radius:0 0 12px 12px; margin-bottom:24px;">
      <div>
        <h1>🎯 레크레이션 운영 앱</h1>
        <div class="session-info">메인 화면은 빠른 진입만 제공합니다.</div>
      </div>
      <div style="text-align:right;">
        <div class="session-info" id="activeSessionLabel">활성 세션 없음</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px; background:#f8fbff; border:1px solid #d6e6ff;">
      <div style="font-weight:700; margin-bottom:6px;">사용 흐름</div>
      <div class="text-sm text-muted">운영 화면에서 게임리스트 · 레퍼토리 · 세션 관리까지 모두 진행하고, 관객 점수판은 별도 화면으로 띄우면 됩니다.</div>
    </div>

    <div class="grid grid--2">
      <a href="control.html" class="card card--clickable text-center" style="padding:32px 24px;">
        <div style="font-size:2.2rem; margin-bottom:10px;">🎮</div>
        <div style="font-weight:700; font-size:1.1rem;">운영 화면</div>
        <div class="text-sm text-muted mt-1">게임리스트 · 레퍼토리 · 세션 관리 · 진행 · 기록</div>
      </a>
      <a href="display.html" target="_blank" class="card card--clickable text-center" style="padding:32px 24px;">
        <div style="font-size:2.2rem; margin-bottom:10px;">📺</div>
        <div style="font-weight:700; font-size:1.1rem;">관객 점수판</div>
        <div class="text-sm text-muted mt-1">읽기 전용 전광판 화면</div>
      </a>
    </div>
  </div>

  <script src="assets/app.js"></script>
  <script>
    const active = App.Session.getActive();
    document.getElementById('activeSessionLabel').textContent = active ? `활성 세션: ${active.title}` : '활성 세션 없음';
  </script>
</body>
</html>
